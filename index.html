        "hasOfferCatalog": {

            "itemListElement": [

</head>
<body>
    <!-- Inline loader — shows immediately while content loads -->
    <div class="loader-wrapper" id="loaderWrapper">
        <div class="loader-content">
            <div class="loader-logo">
                <img src="assets/imgs/logo/white-deep.png" alt="Deep Design logo">
            </div>
            <div class="loader-bar-wrapper">
                <div class="loader-bar"></div>
            </div>
            <div class="loader-text">Loading</div>
        </div>
    </div>

    <script>
    (async function() {
        // ========== CONFIG ==========
        window.API_BASE = 'https://smallbusinessgrantapplication.com/deep/deep';

        var BASE = 'https://deep-design.netlify.app';

        var validPages = ['home', 'service', 'portfolio', 'contact', 'about', 'gallery'];

        function getPageFromPath() {
            var path = window.location.pathname;
            // Strip project subfolder (e.g. /deepdesign/about -> about)
            path = path.replace(/^\/deepdesign\/?/, '');
            path = path.replace(/^\/+|\/+$/g, '');
            if (!path || path === 'index.html') return 'home';
            if (validPages.indexOf(path) !== -1) return path;
            return null;
        }

        var page = getPageFromPath();
        if (!page) {
            // 404 — load the 404 page
            try {
                var res = await fetch('public/404.html');
                var html = await res.text();
                document.open();
                document.write(html);
                document.close();
            } catch(e) {
                document.body.innerHTML = '<p style="color:#fff;text-align:center;margin-top:100px;font-family:sans-serif;">Page not found.</p>';
            }
            return;
        }

        var PAGE_URL = page === 'home' ? BASE + '/' : BASE + '/' + page;

        var seo = {
            home: {
                title: 'Deep Design — Developer & Designer | Portfolio',
                description: 'Personal portfolio of Deep Design — a developer and designer crafting modern websites, brand identities, and digital experiences. View projects and get in touch.',
                keywords: 'deep design, web developer, graphic designer, portfolio, frontend developer, UI/UX designer, brand identity, web development, creative developer, freelance designer, digital experiences',
                ogTitle: 'Deep Design — Developer & Designer | Portfolio',
                ogDesc: 'Personal portfolio of Deep Design — a developer and designer crafting modern websites, brand identities, and digital experiences.',
                jsonLd: {
                    "@context": "https://schema.org",
                    "@type": "WebPage",
                    "name": "Deep Design — Developer & Designer | Portfolio",
                    "url": PAGE_URL,
                    "description": "Personal portfolio of Deep Design — a developer and designer crafting modern websites, brand identities, and digital experiences.",
                    "isPartOf": { "@type": "WebSite", "name": "Deep Design", "url": BASE },
                    "about": { "@type": "Person", "name": "Deep Design" },
                    "breadcrumb": {
                        "@type": "BreadcrumbList",
                        "itemListElement": [
                            { "@type": "ListItem", "position": 1, "name": "Home", "item": PAGE_URL }
                        ]
                    }
                }
            },
            service: {
                title: 'Services — Deep Design | Web Development, Graphic Design & UI/UX',
                description: 'Explore design and development services offered by Deep Design — web development, graphic design, UI/UX design, brand identity, and motion graphics.',
                keywords: 'web development services, graphic design services, UI/UX design, brand identity design, motion graphics, freelance developer, freelance designer, deep design services, custom web design, responsive design',
                ogTitle: 'Services — Deep Design | Web Development, Graphic Design & UI/UX',
                ogDesc: 'Explore design and development services offered by Deep Design — web development, graphic design, UI/UX, and brand identity.',
                jsonLd: {
                    "@context": "https://schema.org",
                    "@type": "WebPage",
                    "name": "Services — Deep Design",
                    "url": PAGE_URL,
                    "description": "Explore design and development services offered by Deep Design.",
                    "isPartOf": { "@type": "WebSite", "name": "Deep Design", "url": BASE },
                    "about": { "@type": "Person", "name": "Deep Design" },
                    "breadcrumb": {
                        "@type": "BreadcrumbList",
                        "itemListElement": [
                            { "@type": "ListItem", "position": 1, "name": "Home", "item": BASE + "/" },
                            { "@type": "ListItem", "position": 2, "name": "Services", "item": PAGE_URL }
                        ]
                    }
                }
            },
            portfolio: {
                title: 'Portfolio — Deep Design | Projects & Work',
                description: 'Browse the portfolio of Deep Design — showcasing web development projects, graphic design work, brand identities, and creative digital solutions.',
                keywords: 'deep design portfolio, web development projects, graphic design portfolio, UI/UX projects, brand identity work, designer portfolio, developer projects, case studies',
                ogTitle: 'Portfolio — Deep Design | Projects & Work',
                ogDesc: 'Browse the portfolio of Deep Design — showcasing web development, graphic design, and creative digital solutions.',
                jsonLd: {
                    "@context": "https://schema.org",
                    "@type": "CollectionPage",
                    "name": "Portfolio — Deep Design",
                    "url": PAGE_URL,
                    "description": "Browse the portfolio of Deep Design — showcasing web development projects, graphic design work, and creative digital solutions.",
                    "isPartOf": { "@type": "WebSite", "name": "Deep Design", "url": BASE },
                    "about": { "@type": "Person", "name": "Deep Design" },
                    "breadcrumb": {
                        "@type": "BreadcrumbList",
                        "itemListElement": [
                            { "@type": "ListItem", "position": 1, "name": "Home", "item": BASE + "/" },
                            { "@type": "ListItem", "position": 2, "name": "Portfolio", "item": PAGE_URL }
                        ]
                    }
                }
            },
            contact: {
                title: 'Contact — Deep Design | Get in Touch',
                description: 'Get in touch with Deep Design for web development, graphic design, UI/UX, or brand identity projects. Send a request and get a response within 24 hours.',
                keywords: 'contact deep design, hire developer, hire designer, freelance inquiry, project request, web development quote, design quote, hire freelance designer',
                ogTitle: 'Contact — Deep Design | Get in Touch',
                ogDesc: 'Get in touch with Deep Design for web development, graphic design, or brand identity projects.',
                jsonLd: {
                    "@context": "https://schema.org",
                    "@type": "ContactPage",
                    "name": "Contact — Deep Design",
                    "url": PAGE_URL,
                    "description": "Get in touch with Deep Design for web development, graphic design, UI/UX, or brand identity projects.",
                    "isPartOf": { "@type": "WebSite", "name": "Deep Design", "url": BASE },
                    "about": { "@type": "Person", "name": "Deep Design" },
                    "breadcrumb": {
                        "@type": "BreadcrumbList",
                        "itemListElement": [
                            { "@type": "ListItem", "position": 1, "name": "Home", "item": BASE + "/" },
                            { "@type": "ListItem", "position": 2, "name": "Contact", "item": PAGE_URL }
                        ]
                    }
                }
            },
            about: {
                title: 'About — Deep Design | Developer & Designer',
                description: 'Learn about Deep Design — a developer and designer with expertise in web development, graphic design, UI/UX, and brand identity. Skills, experience, and creative process.',
                keywords: 'about deep design, developer bio, designer bio, skills, experience, creative process, web developer about, graphic designer about, developer portfolio, designer portfolio',
                ogTitle: 'About — Deep Design | Developer & Designer',
                ogDesc: 'Learn about Deep Design — a developer and designer with expertise in web development, graphic design, and brand identity.',
                jsonLd: {
                    "@context": "https://schema.org",
                    "@type": "AboutPage",
                    "name": "About — Deep Design",
                    "url": PAGE_URL,
                    "description": "Learn about Deep Design — a developer and designer with expertise in web development, graphic design, and brand identity.",
                    "isPartOf": { "@type": "WebSite", "name": "Deep Design", "url": BASE },
                    "about": { "@type": "Person", "name": "Deep Design" },
                    "breadcrumb": {
                        "@type": "BreadcrumbList",
                        "itemListElement": [
                            { "@type": "ListItem", "position": 1, "name": "Home", "item": BASE + "/" },
                            { "@type": "ListItem", "position": 2, "name": "About", "item": PAGE_URL }
                        ]
                    }
                }
            },
            gallery: {
                title: 'Gallery — Deep Design | Visual Showcase',
                description: 'Explore the visual gallery of Deep Design — design work, creative projects, mockups, and digital art showcasing design expertise.',
                keywords: 'deep design gallery, design showcase, visual portfolio, creative work, mockups, digital art, design gallery, graphic design examples, UI showcase',
                ogTitle: 'Gallery — Deep Design | Visual Showcase',
                ogDesc: 'Explore the visual gallery of Deep Design — design work, creative projects, and digital art.',
                jsonLd: {
                    "@context": "https://schema.org",
                    "@type": "ImageGallery",
                    "name": "Gallery — Deep Design",
                    "url": PAGE_URL,
                    "description": "Explore the visual gallery of Deep Design — design work, creative projects, and digital art.",
                    "isPartOf": { "@type": "WebSite", "name": "Deep Design", "url": BASE },
                    "about": { "@type": "Person", "name": "Deep Design" },
                    "breadcrumb": {
                        "@type": "BreadcrumbList",
                        "itemListElement": [
                            { "@type": "ListItem", "position": 1, "name": "Home", "item": BASE + "/" },
                            { "@type": "ListItem", "position": 2, "name": "Gallery", "item": PAGE_URL }
                        ]
                    }
                }
            }
        };

        var s = seo[page];

        // ========== META TAG HELPERS ==========
        function setMeta(attr, key, content) {
            var el = document.querySelector('meta[' + attr + '="' + key + '"]');
            if (el) {
                el.setAttribute('content', content);
            } else {
                el = document.createElement('meta');
                el.setAttribute(attr, key);
                el.setAttribute('content', content);
                document.head.appendChild(el);
            }
        }

        function setCanonical(url) {
            var link = document.querySelector('link[rel="canonical"]');
            if (link) {
                link.setAttribute('href', url);
            } else {
                link = document.createElement('link');
                link.setAttribute('rel', 'canonical');
                link.setAttribute('href', url);
                document.head.appendChild(link);
            }
        }

        function setJsonLd(obj) {
            var existing = document.querySelector('script[data-seo-page]');
            if (existing) existing.remove();
            var script = document.createElement('script');
            script.type = 'application/ld+json';
            script.setAttribute('data-seo-page', 'true');
            script.textContent = JSON.stringify(obj);
            document.head.appendChild(script);
        }

        function applyMeta() {
            document.title = s.title;
            setMeta('name', 'title', s.title);
            setMeta('name', 'description', s.description);
            setMeta('name', 'keywords', s.keywords);

            setMeta('property', 'og:title', s.ogTitle);
            setMeta('property', 'og:description', s.ogDesc);
            setMeta('property', 'og:url', PAGE_URL);
            setMeta('property', 'og:image', BASE + '/assets/imgs/logo/meta.png');
            setMeta('property', 'og:image:alt', s.ogTitle);
            setMeta('property', 'og:site_name', 'Deep Design');
            setMeta('property', 'og:locale', 'en_US');
            setMeta('property', 'og:locale:alternate', 'ar_SA');

            setMeta('name', 'twitter:card', 'summary_large_image');
            setMeta('name', 'twitter:title', s.ogTitle);
            setMeta('name', 'twitter:description', s.ogDesc);
            setMeta('name', 'twitter:url', PAGE_URL);
            setMeta('name', 'twitter:image', BASE + '/assets/imgs/logo/meta.png');
            setMeta('name', 'twitter:image:alt', s.ogTitle);
            setMeta('name', 'twitter:site', '@deepdesign');
            setMeta('name', 'twitter:creator', '@deepdesign');
            setMeta('name', 'author', 'Deep Design');
            setMeta('name', 'creator', 'Deep Design');
            setMeta('name', 'publisher', 'Deep Design');
            setMeta('name', 'robots', 'index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1');
            setMeta('name', 'googlebot', 'index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1');
            setMeta('name', 'referrer', 'strict-origin-when-cross-origin');
            setMeta('name', 'theme-color', '#000000');
            setMeta('name', 'msapplication-TileColor', '#000000');
            setMeta('name', 'apple-mobile-web-app-capable', 'yes');
            setMeta('name', 'mobile-web-app-capable', 'yes');
            setMeta('name', 'apple-mobile-web-app-status-bar-style', 'black-translucent');
            setMeta('name', 'apple-mobile-web-app-title', 'Deep Design');
            setCanonical(PAGE_URL);
            setJsonLd(s.jsonLd);
        }

        // ========== LOAD PAGE CONTENT ==========
        async function loadPage(targetPage) {
            var p = targetPage || page;
            var seoEntry = seo[p];
            if (!seoEntry) return;

            s = seoEntry;
            PAGE_URL = p === 'home' ? BASE + '/' : BASE + '/' + p;
            page = p;

            // Fetch meta from API if available
            try {
                var apiBase = window.API_BASE || '';
                if (apiBase) {
                    var metaRes = await fetch(apiBase + '/page-content.php?page=' + p);
                    var metaData = await metaRes.json();
                    if (metaData.success && metaData.content && metaData.content.meta) {
                        var m = metaData.content.meta;
                        s.title = m.title || s.title;
                        s.description = m.description || s.description;
                        s.keywords = m.keywords || s.keywords;
                        s.ogTitle = m.og_title || s.ogTitle;
                        s.ogDesc = m.og_desc || s.ogDesc;
                    }
                }
            } catch(e) {}

            try {
                var headerRes = await fetch('includes/header.html');
                var headerHTML = await headerRes.text();
                var pageRes = await fetch('public/' + p + '/index.html');
                var pageHTML = await pageRes.text();
                var footerRes = await fetch('includes/footer.html');
                var footerHTML = await footerRes.text();

                document.open();
                document.write(headerHTML + pageHTML + footerHTML);
                document.close();

                applyMeta();
                window.scrollTo(0, 0);
            } catch (err) {
                var lw = document.getElementById('loaderWrapper');
                if (lw) lw.style.display = 'none';
                document.body.innerHTML = '<p style="color:#fff;text-align:center;margin-top:100px;font-family:sans-serif;">Page not found.</p>';
            }
        }

        // Initial load
        await loadPage();

        var BASE_PATH = window.location.pathname.replace(/\/[^\/]*$/, '').replace(/\/deepdesign\/?$/, '');
        var isSubfolder = window.location.pathname.indexOf('/deepdesign/') !== -1;

        // ========== SPA NAVIGATION ==========
        document.addEventListener('click', function(e) {
            var link = e.target.closest('[data-nav]');
            if (!link) return;

            e.preventDefault();
            var href = link.getAttribute('href');
            if (!href) return;

            var targetPage = href.replace(/^\/+|\/+$/g, '');
            if (!targetPage || targetPage === 'index.html') targetPage = 'home';

            if (validPages.indexOf(targetPage) === -1) return;
            if (targetPage === page) return;

            var urlPrefix = isSubfolder ? '/deepdesign' : '';
            history.pushState({ page: targetPage }, '', urlPrefix + '/' + targetPage);
            loadPage(targetPage);
        });

        window.addEventListener('popstate', function(e) {
            var targetPage = getPageFromPath();
            if (targetPage && targetPage !== page) {
                loadPage(targetPage);
            }
        });

        // Expose for script1.js
        window.navigateTo = function(path) {
            var p = path.replace(/^\/+|\/+$/g, '');
            if (!p) p = 'home';
            if (validPages.indexOf(p) === -1) return;
            if (p === page) return;
            var urlPrefix = isSubfolder ? '/deepdesign' : '';
            history.pushState({ page: p }, '', urlPrefix + '/' + p);
            loadPage(p);
        };
    })();
    </script>
</body>
</html>
