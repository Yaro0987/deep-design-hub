            portfolio: {

                keywords: 'deep design hubs portfolio, web development projects, graphic design portfolio, UI/UX projects, brand identity work, designer portfolio, developer projects, case studies, website mockups, logo design examples',

            about: {

                keywords: 'about deep design hubs, developer bio, designer bio, skills, experience, creative process, web developer about, graphic designer about, frontend developer, UI/UX designer, full stack developer',
                ogTitle: 'About — Deep Design Hubs | Developer & Designer',
                ogDesc: 'Learn about Deep Design Hubs — expertise in web development, graphic design, UI/UX, brand identity, and motion graphics.',
                jsonLd: {
                    "@context": "https://schema.org",

                    "name": "About — Deep Design Hubs",

                    "description": "Learn about Deep Design Hubs — expertise in web development, graphic design, UI/UX, brand identity, and motion graphics.",
                    "isPartOf": { "@type": "WebSite", "name": "Deep Design Hubs", "url": BASE },

                    "breadcrumb": {
                        "@type": "BreadcrumbList",
                        "itemListElement": [
                            { "@type": "ListItem", "position": 1, "name": "Home", "item": BASE + "/" },

            gallery: {
                title: 'Gallery — Deep Design Hubs | Visual Showcase',
                description: 'Explore the visual gallery of Deep Design Hubs — design work, creative projects, mockups, UI screens, and digital art showcasing our design expertise.',
                keywords: 'deep design hubs gallery, design showcase, visual portfolio, creative work, mockups, digital art, design gallery, graphic design examples, UI showcase, web design gallery, brand identity examples',
                ogTitle: 'Gallery — Deep Design Hubs | Visual Showcase',
                ogDesc: 'Explore the visual gallery of Deep Design Hubs — design work, creative projects, and digital art.',
                jsonLd: {
                    "@context": "https://schema.org",
                    "@type": "ImageGallery",
                    "name": "Gallery — Deep Design Hubs",
                    "url": PAGE_URL,
                    "description": "Explore the visual gallery of Deep Design Hubs — design work, creative projects, and digital art.",
                    "isPartOf": { "@type": "WebSite", "name": "Deep Design Hubs", "url": BASE },
                    "about": { "@type": "Person", "name": "Deep Design Hubs" },
                    "breadcrumb": {
                        "@type": "BreadcrumbList",
                        "itemListElement": [
                            { "@type": "ListItem", "position": 1, "name": "Home", "item": BASE + "/" },
                            { "@type": "ListItem", "position": 2, "name": "Gallery", "item": PAGE_URL }
                        ]
                    }
                }
            }
        };

        var s = seo[page];

        // ========== META TAG HELPERS ==========
        function setMeta(attr, key, content) {
            var el = document.querySelector('meta[' + attr + '="' + key + '"]');
            if (el) {
                el.setAttribute('content', content);
            } else {
                el = document.createElement('meta');
                el.setAttribute(attr, key);
                el.setAttribute('content', content);
                document.head.appendChild(el);
            }
        }

        function setCanonical(url) {
            var link = document.querySelector('link[rel="canonical"]');
            if (link) {
                link.setAttribute('href', url);
            } else {
                link = document.createElement('link');
                link.setAttribute('rel', 'canonical');
                link.setAttribute('href', url);
                document.head.appendChild(link);
            }
        }

        function setJsonLd(obj) {
            var existing = document.querySelector('script[data-seo-page]');
            if (existing) existing.remove();
            var script = document.createElement('script');
            script.type = 'application/ld+json';
            script.setAttribute('data-seo-page', 'true');
            script.textContent = JSON.stringify(obj);
            document.head.appendChild(script);
        }

        function applyMeta() {
            document.title = s.title;
            setMeta('name', 'title', s.title);
            setMeta('name', 'description', s.description);
            setMeta('name', 'keywords', s.keywords);

            setMeta('property', 'og:title', s.ogTitle);
            setMeta('property', 'og:description', s.ogDesc);
            setMeta('property', 'og:url', PAGE_URL);
            setMeta('property', 'og:image', BASE + '/assets/imgs/logo/meta.png');
            setMeta('property', 'og:image:alt', s.ogTitle);
            setMeta('property', 'og:site_name', 'Deep Design Hubs');
            setMeta('property', 'og:locale', 'en_US');
            setMeta('property', 'og:locale:alternate', 'ar_SA');

            setMeta('name', 'twitter:card', 'summary_large_image');
            setMeta('name', 'twitter:title', s.ogTitle);
            setMeta('name', 'twitter:description', s.ogDesc);
            setMeta('name', 'twitter:url', PAGE_URL);
            setMeta('name', 'twitter:image', BASE + '/assets/imgs/logo/meta.png');
            setMeta('name', 'twitter:image:alt', s.ogTitle);
            setMeta('name', 'twitter:site', '@deepdesign');
            setMeta('name', 'twitter:creator', '@deepdesign');
            setMeta('name', 'author', 'Deep Design Hubs');
            setMeta('name', 'creator', 'Deep Design Hubs');
            setMeta('name', 'publisher', 'Deep Design Hubs');
            setMeta('name', 'robots', 'index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1');
            setMeta('name', 'googlebot', 'index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1');
            setMeta('name', 'referrer', 'strict-origin-when-cross-origin');
            setMeta('name', 'theme-color', '#000000');
            setMeta('name', 'msapplication-TileColor', '#000000');
            setMeta('name', 'apple-mobile-web-app-capable', 'yes');
            setMeta('name', 'mobile-web-app-capable', 'yes');
            setMeta('name', 'apple-mobile-web-app-status-bar-style', 'black-translucent');
            setMeta('name', 'apple-mobile-web-app-title', 'Deep Design Hubs');
            setCanonical(PAGE_URL);
            setJsonLd(s.jsonLd);
        }

        // ========== LOAD PAGE CONTENT ==========
        async function loadPage(targetPage, targetSlug) {
            var p = targetPage || page;
            var isProjectPage = (p === 'portfolio-project');

            if (isProjectPage && targetSlug) {
                projectSlug = targetSlug;
                PAGE_URL = BASE + '/portfolio/' + targetSlug;
            } else if (!isProjectPage) {
                var seoEntry = seo[p];
                if (!seoEntry) return;
                s = seoEntry;
                PAGE_URL = p === 'home' ? BASE + '/' : BASE + '/' + p;
                page = p;
            } else {
                page = p;
            }

            // Fetch meta from API if available (not for project pages — they handle their own SEO)
            if (!isProjectPage) {
                try {
                    var apiBase = window.API_BASE || '';
                    if (apiBase) {
                        var metaRes = await fetch(apiBase + '/page-content.php?page=' + p);
                        var metaData = await metaRes.json();
                        if (metaData.success && metaData.content && metaData.content.meta) {
                            var m = metaData.content.meta;
                            s.title = m.title || s.title;
                            s.description = m.description || s.description;
                            s.keywords = m.keywords || s.keywords;
                            s.ogTitle = m.og_title || s.ogTitle;
                            s.ogDesc = m.og_desc || s.ogDesc;
                        }
                    }
                } catch(e) {}
            }

            try {
                var isSub = window.location.pathname.indexOf('/deepdesign/') !== -1;
                var baseUrl = (isSub ? '/deepdesign' : '');
                var headerRes = await fetch(baseUrl + '/includes/header.html');
                var headerHTML = await headerRes.text();
                var pageFile = baseUrl + (isProjectPage
                    ? '/public/portfolio/project.html'
                    : '/public/' + p + '/index.html');
                var pageRes = await fetch(pageFile);
                var pageHTML = await pageRes.text();
                var footerRes = await fetch(baseUrl + '/includes/footer.html');
                var footerHTML = await footerRes.text();

                document.open();
                document.write(headerHTML + pageHTML + footerHTML);
                document.close();

                // Re-inject script1.js — document.write() after parsing doesn't execute <script> tags
                var s1 = document.createElement('script');
                s1.src = baseUrl + '/assets/js/script1.js';
                document.body.appendChild(s1);

                if (!isProjectPage) {
                    applyMeta();
                }
                window.scrollTo(0, 0);
            } catch (err) {
                var lw = document.getElementById('loaderWrapper');
                if (lw) lw.style.display = 'none';
                document.body.innerHTML = '<p style="color:#fff;text-align:center;margin-top:100px;font-family:sans-serif;">Page not found.</p>';
            }
        }

        // Initial load
        await loadPage();

        var BASE_PATH = window.location.pathname.replace(/\/[^\/]*$/, '').replace(/\/deepdesign\/?$/, '');
        var isSubfolder = window.location.pathname.indexOf('/deepdesign/') !== -1;

        // ========== SPA NAVIGATION ==========
        document.addEventListener('click', function(e) {
            var link = e.target.closest('[data-nav]');
            if (!link) return;

            e.preventDefault();
            var href = link.getAttribute('href');
            if (!href) return;

            var target = href.replace(/^\/+|\/+$/g, '');
            if (!target || target === 'index.html') target = 'home';

            var urlPrefix = isSubfolder ? '/deepdesign' : '';

            // Check if it's a portfolio project link (/portfolio/{slug})
            var targetParts = target.split('/');
            if (targetParts.length === 2 && targetParts[0] === 'portfolio' && validPages.indexOf(targetParts[1]) === -1) {
                history.pushState({ page: 'portfolio-project', slug: targetParts[1] }, '', urlPrefix + '/portfolio/' + targetParts[1]);
                loadPage('portfolio-project', targetParts[1]);
                return;
            }

            if (validPages.indexOf(target) === -1) return;
            if (target === page && page !== 'portfolio-project') return;

            history.pushState({ page: target }, '', urlPrefix + '/' + target);
            loadPage(target);
        });

        window.addEventListener('popstate', function(e) {
            var targetPage = getPageFromPath();
            if (targetPage && (targetPage !== page || targetPage === 'portfolio-project')) {
                if (targetPage === 'portfolio-project') {
                    loadPage('portfolio-project', projectSlug);
                } else {
                    loadPage(targetPage);
                }
            }
        });

        // Expose for script1.js
        window.navigateTo = function(path) {
            var p = path.replace(/^\/+|\/+$/g, '');
            if (!p) p = 'home';
            var urlPrefix = isSubfolder ? '/deepdesign' : '';

            // Check if it's a portfolio project link
            var parts = p.split('/');
            if (parts.length === 2 && parts[0] === 'portfolio' && validPages.indexOf(parts[1]) === -1) {
                history.pushState({ page: 'portfolio-project', slug: parts[1] }, '', urlPrefix + '/portfolio/' + parts[1]);
                loadPage('portfolio-project', parts[1]);
                return;
            }

            if (validPages.indexOf(p) === -1) return;
            if (p === page && page !== 'portfolio-project') return;
            history.pushState({ page: p }, '', urlPrefix + '/' + p);
            loadPage(p);
        };
    })();
